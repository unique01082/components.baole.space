name: Release & Publish to NPM

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0, v2.1.3

permissions:
  contents: write # Required for creating releases
  id-token: write # Required for npm provenance

jobs:
  release:
    name: Build, Test & Publish
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for changelog generation
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          # Don't use registry-url with Trusted Publishers - it creates .npmrc expecting NODE_AUTH_TOKEN
          # Trusted Publishers uses OIDC tokens automatically via GitHub Actions environment
      
      - name: Upgrade npm to latest version (for Trusted Publishers support)
        run: npm install -g npm@latest
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run tests
        run: pnpm run test
      
      - name: Build library
        run: pnpm run build:lib
      
      - name: Verify npm configuration
        run: |
          echo "npm version: $(npm --version)"
          echo "node version: $(node --version)"
          npm config list
      
      - name: Publish to npm with Trusted Publishers
        # npm CLI (>= 9.5.0) automatically uses OIDC when:
        # 1. id-token: write permission is set (done above)
        # 2. --provenance flag is used  
        # 3. No registry-url in setup-node (prevents .npmrc with NODE_AUTH_TOKEN template)
        # GitHub provides OIDC token automatically - no manual auth needed
        run: npm publish --provenance
      
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Checkout master branch for changelog
        run: |
          git fetch origin master
          git checkout master
          git pull origin master
      
      - name: Generate changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-file: 'CHANGELOG.md'
          skip-version-file: 'true'
          skip-commit: 'false'
          skip-tag: 'true'
          skip-on-empty: 'false'
          skip-git-pull: 'true'
          skip-bump: 'true'
          skip-ci: 'true'
          git-message: 'docs: update CHANGELOG.md for {version}'
          git-user-name: 'github-actions[bot]'
          git-user-email: 'github-actions[bot]@users.noreply.github.com'
          git-branch: 'master'
      
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            ## @baolq/ui v${{ steps.version.outputs.VERSION }}
            
            ${{ steps.changelog.outputs.clean_changelog }}
            
            ---
            
            **Installation**
            ```bash
            npm install @baolq/ui@${{ steps.version.outputs.VERSION }}
            # or
            pnpm add @baolq/ui@${{ steps.version.outputs.VERSION }}
            ```
            
            **NPM Package**: https://www.npmjs.com/package/@baolq/ui/v/${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          # Skip if Discord webhook is not configured
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "Discord webhook not configured, skipping notification"
            exit 0
          fi
          
          VERSION="${{ steps.version.outputs.VERSION }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          NPM_URL="https://www.npmjs.com/package/@baolq/ui/v/${VERSION}"
          RELEASE_TYPE="Stable"
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            RELEASE_TYPE="Pre-release"
          fi
          
          # Prefer changelog action output, then fallback to latest section in CHANGELOG.md.
          CHANGELOG_RAW='${{ steps.changelog.outputs.clean_changelog }}'

          if [ -z "$(echo "$CHANGELOG_RAW" | tr -d '[:space:]')" ] && [ -f "CHANGELOG.md" ]; then
            CHANGELOG_RAW=$(awk '
              BEGIN { section = 0 }
              /^## \[/ {
                if (section == 0) { section = 1; next }
                if (section == 1) { exit }
              }
              section == 1 { print }
            ' CHANGELOG.md)
          fi

          CHANGELOG_CLEAN=$(echo "$CHANGELOG_RAW" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d')
          if [ -z "$CHANGELOG_CLEAN" ]; then
            CHANGELOG_CLEAN="No detailed changelog was generated for this release."
          fi

          # Discord embed field max length is 1024.
          CHANGELOG_TRIMMED=$(echo "$CHANGELOG_CLEAN" | head -c 980)
          if [ ${#CHANGELOG_CLEAN} -gt 980 ]; then
            CHANGELOG_TRIMMED="${CHANGELOG_TRIMMED}..."
          fi

          PAYLOAD=$(jq -n \
            --arg version "$VERSION" \
            --arg releaseUrl "$RELEASE_URL" \
            --arg npmUrl "$NPM_URL" \
            --arg releaseType "$RELEASE_TYPE" \
            --arg changelog "$CHANGELOG_TRIMMED" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" \
            '{
              embeds: [
                {
                  title: ("Release v" + $version + " is live"),
                  description: "A new @baolq/ui package is available on npm.",
                  color: (if $releaseType == "Pre-release" then 16098851 else 5763719 end),
                  url: $releaseUrl,
                  author: {
                    name: "@baolq/ui"
                  },
                  fields: [
                    {
                      name: "Version",
                      value: ("v" + $version),
                      inline: true
                    },
                    {
                      name: "Channel",
                      value: $releaseType,
                      inline: true
                    },
                    {
                      name: "Package",
                      value: ("[@baolq/ui on npm](" + $npmUrl + ")"),
                      inline: true
                    },
                    {
                      name: "What changed",
                      value: $changelog,
                      inline: false
                    }
                  ],
                  footer: {
                    text: "Published via GitHub Actions"
                  },
                  timestamp: $timestamp
                }
              ],
              components: [
                {
                  type: 1,
                  components: [
                    {
                      type: 2,
                      style: 5,
                      label: "Release Notes",
                      url: $releaseUrl
                    },
                    {
                      type: 2,
                      style: 5,
                      label: "Open npm Package",
                      url: $npmUrl
                    }
                  ]
                }
              ]
            }')
          
          # Send Discord webhook
          curl -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK"
